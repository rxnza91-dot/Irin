<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Irin - Official Store</title>

<link href="https://fonts.googleapis.com/css2?family=Mitr:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root{
--bg:#FFF7F8;
--main:#E7A9B5;
--dark:#B57C8A;
--white:#FFFFFF;
--glow:rgba(231,169,181,0.35);
--accent:#FFE3EA;
--status-red:#FF9DB2;

--header-gradient:
linear-gradient(
135deg,
#F8D7DA,
#FBE4E8,
#FFF5F7
);
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Mitr',sans-serif;
}

body{
background:linear-gradient(to bottom,#FFF7F8,#FFFDFD);
display:flex;
justify-content:center;
position:relative;
overflow-x:hidden;
min-height:100vh;
}

/* --- พื้นหลังอิโมจิฟุ้งๆ --- */
.bg-emojis{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
pointer-events:none;
font-size:24px;
}

.floating-emoji{
position:absolute;
animation:floatBG 15s infinite linear;
opacity:0.4;
}

@keyframes floatBG{
0%{
transform:translateY(110vh) rotate(0deg);
}
100%{
transform:translateY(-10vh) rotate(360deg);
}
}

.container{
max-width:500px;
width:100%;
padding:20px 15px 40px;
z-index:1;
}

.section{
background:rgba(255,255,255,0.92);
border-radius:20px;
padding:25px 20px;
margin-bottom:20px;
border:2px solid #F6D6DD;
box-shadow:0 10px 24px rgba(231,169,181,0.10);
}

h1,h2,h3{
color:var(--dark);
}

.center{
text-align:center;
}

/* HEADER */
.header-section{
background:var(--header-gradient) !important;
border:none !important;
box-shadow:
0 10px 30px rgba(231,169,181,0.16),
0 4px 12px rgba(255,255,255,0.6) !important;
position:relative;
overflow:hidden;
}

.header-section::before{
content:"";
position:absolute;
inset:0;
background:
radial-gradient(circle at top left, rgba(255,255,255,0.45), transparent 45%),
radial-gradient(circle at bottom right, rgba(255,255,255,0.35), transparent 45%);
pointer-events:none;
}

/* --- โลโก้และอิโมจิรอบโลโก้ --- */
.logo-wrapper{
position:relative;
width:200px;
height:200px;
margin:0 auto 20px;
display:flex;
justify-content:center;
align-items:center;
}

.logo{
width:150px;
height:150px;
border-radius:50%;
overflow:hidden;
box-shadow:0 8px 22px rgba(231,169,181,0.22);
border:4px solid var(--white);
position:relative;
z-index:2;
}

.logo img{
width:100%;
height:100%;
object-fit:cover;
}

.logo-deco{
position:absolute;
font-size:28px;
animation:pulse 3s infinite ease-in-out;
}

@keyframes pulse{
0%,100%{
transform:scale(1);
opacity:0.8;
}
50%{
transform:scale(1.2);
opacity:1;
}
}

/* ชื่อร้าน */
.store-title{
font-size:2.35rem;
font-weight:500;
letter-spacing:1px;
color:#C98796;
text-shadow:
0 2px 10px rgba(255,255,255,0.7),
0 2px 8px rgba(201,135,150,0.18);
line-height:1.1;
}

/* subtitle */
.store-subtitle{
color:#B98592;
opacity:.95;
margin:14px 0 22px;
font-size:15px;
letter-spacing:.5px;
line-height:1.9;
padding:0 8px;
}

.badges{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:10px;
margin-bottom:20px;
}

.badge{
background:#FFFDFD;
padding:8px 16px;
border-radius:25px;
box-shadow:0 4px 12px rgba(231,169,181,0.10);
font-size:13px;
color:#B57C8A;
border:1px solid #F5D6DE;
}

.btn{
display:block;
text-align:center;
padding:14px;
border-radius:25px;
text-decoration:none;
margin-top:15px;
font-weight:500;
transition:0.3s;
display:flex;
align-items:center;
justify-content:center;
gap:8px;
}

.btn-outline{
background:#FFFDFD;
border:2px dashed #E7A9B5;
color:#B57C8A;
}

.status-dot{
width:10px;
height:10px;
background-color:var(--status-red);
border-radius:50%;
display:inline-block;
animation:dotBlink 1.2s infinite ease-in-out;
box-shadow:0 0 8px var(--status-red);
}

@keyframes dotBlink{
0%{
opacity:1;
transform:scale(1);
}
50%{
opacity:0.3;
transform:scale(1.2);
}
100%{
opacity:1;
transform:scale(1);
}
}

.btn-main{
background:linear-gradient(135deg,#E7A9B5,#F2C7D0);
color:#fff;
}

.step{
display:flex;
align-items:flex-start;
gap:14px;
margin-bottom:18px;
padding:14px 12px;
border-radius:18px;
background:#FFF9FA;
border:1px solid #F7DCE2;
}

.step-num{
background:linear-gradient(135deg,#E7A9B5,#F2C7D0);
color:#fff;
width:34px;
height:34px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:15px;
font-weight:600;
flex-shrink:0;
margin-top:2px;
box-shadow:0 6px 14px rgba(231,169,181,0.18);
}

.step div:last-child{
line-height:1.8;
font-size:14px;
color:#444;
word-break:break-word;
}

/* PRICE */
.price-row{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:10px;
background:#F8D9E1;
padding:10px 15px;
border-radius:15px;
border-left:4px solid #D98FA2;
box-shadow:0 4px 10px rgba(217,143,162,0.10);
}

.price-row span{
color:#8C5A67;
font-weight:500;
}

.price-tag{
background:#D98FA2;
color:#fff;
padding:3px 12px;
border-radius:20px;
font-size:14px;
white-space:nowrap;
}

.footer{
text-align:center;
margin-top:30px;
}

.socials{
display:flex;
gap:8px;
justify-content:center;
margin-top:15px;
}

.socials a{
flex:1;
max-width:100px;
text-align:center;
padding:8px;
border-radius:25px;
background:#FFFDFD;
text-decoration:none;
color:#B57C8A;
font-size:13px;
border:1px solid #F3D7DE;
}

.small{
font-size:12px;
opacity:.7;
margin-top:10px;
}

.rule-box{
background:#FFF7F8;
padding:15px;
border-radius:15px;
font-size:14px;
margin-top:15px;
border:1px dashed #E7A9B5;
color:#9D6E79;
line-height:1.8;
}
</style>
</head>
